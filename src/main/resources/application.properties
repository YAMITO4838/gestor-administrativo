spring.application.name=Sistema-de-administracion

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gestor_administrativo?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456789}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:gestor-administrativo-secret-key-for-jwt-development-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

server.port=8082